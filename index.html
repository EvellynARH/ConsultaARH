<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Capacidades</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f6f9;
    font-family:'Poppins', sans-serif;
    padding:30px;
    color:#1f2937;
}

/* HEADER */

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:40px;
    font-weight:700;
    margin-bottom:6px;
}

.header p{
    color:#6b7280;
    font-size:15px;
}

/* TOP SECTION */

.top-section{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
    margin-bottom:25px;
    align-items:stretch;
}

/* CARDS */

.card{
    background:white;
    border-radius:22px;
    padding:28px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
    min-height:170px;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

.card h2{
    font-size:52px;
    font-weight:700;
    margin-bottom:8px;
}

.card p{
    color:#6b7280;
    font-size:16px;
}

.producto h2{
    color:#2ecc71;
}

/* TABLA */

.table-card{
    background:white;
    border-radius:22px;
    padding:28px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.table-card h3{
    font-size:20px;
    margin-bottom:18px;
}

#tablaLideres{
    width:100%;
    border-collapse:collapse;
}

#tablaLideres th{
    text-align:left;
    color:#64748b;
    font-size:14px;
    padding-bottom:12px;
}

#tablaLideres td{
    padding:12px 0;
    border-top:1px solid #edf2f7;
    font-size:15px;
}

/* CHART */

.chart-card{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.06);
}

#graficaKg{
    width:100%;
    height:720px;
}

#graficaTendencia{
    width:100%;
    height:700px;
}

/* RESPONSIVE */

@media(max-width:1200px){

    .top-section{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>Distribución de Capacidad</h1>

    <p>
        Análisis operacional por producto y coordinador
    </p>

</div>

<!-- TOP -->

<div class="top-section">

    <div class="card producto">

        <h2 id="mejorProducto">-</h2>

        <p>Producto Más Eficiente</p>

    </div>

    <div class="table-card">

        <h3>Mejor Liderazgo por Producto</h3>

        <table id="tablaLideres">

            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Líder</th>
                    <th>Kg/H/H</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>
</div>



<!-- CHART -->

<div class="chart-card">

    <div id="graficaKg"></div>

</div>

<div class="chart-card" style="margin-top:25px;">

    <h3 style="margin-bottom:20px;">
        Tendencia Histórica Kg/H/H
    </h3>

    <div style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;">
        <select id="filtroProducto" style="padding:10px;border-radius:8px;">
            <option value="Todos">Todos los productos</option>
        </select>

        <select id="filtroLider" style="padding:10px;border-radius:8px;">
            <option value="Todos">Todos los líderes</option>
        </select>
    </div>

    <div id="graficaTendencia"></div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT6O6liPvMsMhpDGLh3vWAB5lKCmypeV4CB2creP1D-RG8f1qe3pkjGWRnvmc7C0ylhn7M5XVpDFpuh/pub?output=csv";

async function cargarDatos(){

    const response = await fetch(sheetURL);

    const csv = await response.text();

    const rows = csv.trim().split("\n").slice(1);

    let datos = {

        "Juan Barron": {
            x: [],
            y: [],
            color: '#ff6b6b'
        },

        "Mercedes Flores": {
            x: [],
            y: [],
            color: '#2ecc71'
        },

        "Ulises Martinez": {
            x: [],
            y: [],
            color: '#4dabf7'
        }

    };

    let violinData = {};

    let tendencias = {};

    let productosSet = new Set();
    let lideresSet = new Set();

    let productoPromedios = {};

    

    rows.forEach(row=>{

        const cols = row.split(",");

        if(cols.length < 8) return;

        const producto = cols[1].trim();

        const lider = cols[2].trim();

        productosSet.add(producto);
        lideresSet.add(lider);

        const hombres = Number(cols[3]);

        const mujeres = Number(cols[4]);

        const horas = Number(cols[5]);

        const kg = Number(cols[6]);

        const personas = hombres + mujeres;

        const kgxhxh = kg / (personas * horas);

        

        const fecha = cols[0].trim();

        const clave = producto + " - " + lider;

        if(!tendencias[clave]){

            tendencias[clave] = {
                x:[],
                y:[]
            };

        }

        tendencias[clave].x.push(fecha);
        tendencias[clave].y.push(kgxhxh);

        // PRODUCTO

        if(!productoPromedios[producto]){

            productoPromedios[producto] = [];

        }

        productoPromedios[producto].push(kgxhxh);

        // PUNTOS

        if(datos[lider]){

            datos[lider].x.push(producto);

            datos[lider].y.push(kgxhxh);

        }

        // VIOLIN

        if(!violinData[producto]){

            violinData[producto] = [];

        }

        violinData[producto].push(kgxhxh);

    });

    // KPI PRODUCTO

    let mejorProducto = "";

    let mejorValor = 0;

    Object.keys(productoPromedios).forEach(producto=>{

        const promedio =
            productoPromedios[producto]
            .reduce((a,b)=>a+b,0)
            / productoPromedios[producto].length;

        if(promedio > mejorValor){

            mejorValor = promedio;

            mejorProducto = producto;

        }

    });

    document.getElementById("mejorProducto")
        .innerText = mejorProducto;

    // TABLA

    let mejoresPorProducto = {};

    rows.forEach(row=>{

        const cols = row.split(",");

        if(cols.length < 8) return;

        const producto = cols[1].trim();

        const lider = cols[2].trim();

        productosSet.add(producto);
        lideresSet.add(lider);

        const hombres = Number(cols[3]);

        const mujeres = Number(cols[4]);

        const horas = Number(cols[5]);

        const kg = Number(cols[6]);

        const personas = hombres + mujeres;

        const kgxhxh = kg / (personas * horas);

        if(
            !mejoresPorProducto[producto]
            ||
            kgxhxh > mejoresPorProducto[producto].valor
        ){

            mejoresPorProducto[producto] = {

                lider,
                valor:kgxhxh

            };

        }

    });

    const tbody =
    document.querySelector("#tablaLideres tbody");

    tbody.innerHTML = "";

    Object.keys(mejoresPorProducto).forEach(producto=>{

        tbody.innerHTML += `

        <tr>
            <td>${producto}</td>
            <td>${mejoresPorProducto[producto].lider}</td>
            <td>${mejoresPorProducto[producto].valor.toFixed(1)}</td>
        </tr>

        `;

    });


    // GRAFICA

    let traces = [];

    // VIOLIN

// VIOLIN

// VIOLIN

Object.keys(violinData).forEach(producto=>{

    traces.push({

        type:'violin',

        y: violinData[producto],

        x: Array(violinData[producto].length).fill(producto),

        name: producto,

        box:{
            visible:true
        },

        meanline:{
            visible:true
        },

        opacity:0.35,

        fillcolor:'rgba(176,184,193,0.25)',

        line:{
            color:'#6b7280',
            width:2
        },

        width:0.7,

        showlegend:false

    });

});
    // PUNTOS

    Object.keys(datos).forEach(lider=>{

        traces.push({

            type:'scatter',

            mode:'markers',

            name: lider,

            x: datos[lider].x,

            y: datos[lider].y,

            marker:{

                size:10,

                color:datos[lider].color,

                line:{
                    color:'white',
                    width:1.5
                }

            }

        });

    });

    Plotly.newPlot('graficaKg', traces, {

        title:{
            text:'Capacidad Kg/H/H por Producto',
            font:{
                size:26
            }
        },

        paper_bgcolor:'white',

        plot_bgcolor:'white',

        font:{
            color:'#1f2937',
            family:'Poppins'
        },

        yaxis:{

            title:'Capacidad (Kg/H/H)',

            gridcolor:'#e9ecef',

            zeroline:false,

            fixedrange:true

        },

        xaxis:{

            title:'Producto',

            gridcolor:'#f1f3f5',

            fixedrange:true

        },

        legend:{

            orientation:'h',

            y:-0.15

        },

        margin:{

            t:80,
            l:80,
            r:40,
            b:80

        }

    },{

        responsive:true,

        displaylogo:false,

        modeBarButtonsToAdd:[

            'zoom2d',
            'pan2d',
            'select2d',
            'lasso2d',
            'zoomIn2d',
            'zoomOut2d',
            'autoScale2d',
            'resetScale2d'

        ]

    });


    
    const filtroProducto = document.getElementById('filtroProducto');
    const filtroLider = document.getElementById('filtroLider');

    if(filtroProducto.options.length === 1){
        [...productosSet].sort().forEach(p=>{
            filtroProducto.innerHTML += `<option value="${p}">${p}</option>`;
        });
    }

    if(filtroLider.options.length === 1){
        [...lideresSet].sort().forEach(l=>{
            filtroLider.innerHTML += `<option value="${l}">${l}</option>`;
        });
    }

// GRAFICA DE TENDENCIAS

    let tracesTendencia = [];

    const productoSeleccionado = document.getElementById('filtroProducto').value;
    const liderSeleccionado = document.getElementById('filtroLider').value;

    Object.keys(tendencias).forEach(clave=>{

        const partes = clave.split(' - ');
        const producto = partes[0];
        const lider = partes[1];

        if(productoSeleccionado !== 'Todos' && producto !== productoSeleccionado) return;
        if(liderSeleccionado !== 'Todos' && lider !== liderSeleccionado) return;

        let pares = tendencias[clave].x.map((fecha,index)=>({
            fecha,
            valor:tendencias[clave].y[index]
        }));

        pares.sort((a,b)=>{

            const [da,ma,aa] = a.fecha.split("/");
            const [db,mb,ab] = b.fecha.split("/");

            return new Date(`${aa}-${ma}-${da}`) -
                   new Date(`${ab}-${mb}-${db}`);

        });

        const palette = [
            '#ff6b6b','#4dabf7','#2ecc71','#f59f00','#9775fa',
            '#20c997','#e64980','#845ef7','#fd7e14','#15aabf',
            '#82c91e','#fa5252','#5c7cfa','#12b886','#cc5de8'
        ];

        let hash = 0;
        for(let i=0;i<clave.length;i++){
            hash = clave.charCodeAt(i) + ((hash << 5) - hash);
        }

        let colorLinea = palette[Math.abs(hash) % palette.length];

        tracesTendencia.push({

            type:'scatter',
            mode:'lines+markers',
            name:clave,

            x: pares.map(p=>p.fecha),
            y: pares.map(p=>p.valor),

            line:{
                width:3,
                color:colorLinea
            },

            marker:{
                size:8,
                color:colorLinea
            }

        });

    });

    Plotly.newPlot(

        'graficaTendencia',

        tracesTendencia,

        {

            title:{
                text:'Comportamiento Histórico Kg/H/H',
                font:{
                    size:24
                }
            },

            paper_bgcolor:'white',
            plot_bgcolor:'white',

            font:{
                family:'Poppins',
                color:'#1f2937'
            },

            xaxis:{
                title:'Fecha',
                type:'category',
                categoryorder:'array',
                categoryarray:[...new Set(
                    Object.values(tendencias)
                    .flatMap(t=>t.x)
                    .sort((a,b)=>{
                        const [da,ma,aa]=a.split('/');
                        const [db,mb,ab]=b.split('/');
                        return new Date(`${aa}-${ma}-${da}`)-new Date(`${ab}-${mb}-${db}`);
                    })
                )]
            },

            yaxis:{
                title:'Kg/H/H'
            },

            legend:{
                orientation:'h',
                y:-0.25
            },

            hovermode:'closest',

            margin:{
                t:80,
                l:80,
                r:40,
                b:120
            }

        },

        {
            responsive:true,
            displaylogo:false
        }

    );

}

cargarDatos();

document.getElementById('filtroProducto')?.addEventListener('change', cargarDatos);
document.getElementById('filtroLider')?.addEventListener('change', cargarDatos);

setInterval(cargarDatos,30000);

</script>

</body>
</html>
